services:

  # Start:   docker compose up -d
  # Logs:    docker compose logs -f
  # Stop:    docker compose down
  # Update:  docker compose pull && docker compose up -d
  #
  # One-off commands (run against the already-running container):
  #   docker exec up-actual-sync python up_bank_to_actual.py --list-accounts
  #   docker exec up-actual-sync python up_bank_to_actual.py --once
  up-sync:
    image: ghcr.io/finite5084/up-actual-sync:latest
    container_name: up-actual-sync
    restart: unless-stopped
    env_file: .env