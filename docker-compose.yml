services:

  # Start:   docker compose up -d
  # Logs:    docker compose logs -f
  # Stop:    docker compose down
  #
  # One-off commands (run against the already-running container):
  #   docker exec up-actual-sync python up_bank_to_actual.py --list-accounts
  #   docker exec up-actual-sync python up_bank_to_actual.py --once
  up-sync:
    build: .
    container_name: up-actual-sync
    restart: unless-stopped
    env_file: .env
    networks:
      - actual_network

networks:
  actual_network:
    external: true   # join an existing network rather than creating a new one
    name: actual_network   # change this to match your Actual Budget container's network
                           # run: docker inspect <actual-container-name> | grep -A5 Networks
